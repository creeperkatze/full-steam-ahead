name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build"
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    uses: ./.github/workflows/test.yml
    with:
      ref: ${{ inputs.tag || github.ref }}

  build:
    name: Build
    needs: test
    strategy:
      fail-fast: false
      matrix:
        platform:
          - windows-latest
          - ubuntu-latest
          - macos-latest
        include:
          - platform: windows-latest
            artifact-target-name: x86_64-pc-windows-msvc
            bundles: nsis,msi
            bundle-path: src-tauri/target/release/bundle
            tauri-target: ""
          - platform: ubuntu-latest
            artifact-target-name: x86_64-unknown-linux-gnu
            bundles: deb,appimage,rpm
            bundle-path: src-tauri/target/release/bundle
            tauri-target: ""
          - platform: macos-latest
            artifact-target-name: universal-apple-darwin
            bundles: dmg
            bundle-path: src-tauri/target/universal-apple-darwin/release/bundle
            tauri-target: --target universal-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install macOS universal targets
        if: contains(matrix.platform, 'macos')
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: Install Linux build dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build app
        run: pnpm tauri build --bundles ${{ matrix.bundles }} ${{ matrix.tauri-target }}

      - name: Package standalone app
        if: runner.os != 'macOS'
        shell: bash
        run: |
          mkdir -p standalone
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp "src-tauri/target/release/Full Steam Ahead.exe" "standalone/Full Steam Ahead.exe"
          elif [ -f "src-tauri/target/release/Full Steam Ahead" ]; then
            cp "src-tauri/target/release/Full Steam Ahead" "standalone/Full Steam Ahead"
          else
            cp "src-tauri/target/release/full-steam-ahead" "standalone/full-steam-ahead"
          fi

      - name: Upload app bundles
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: App bundle (${{ matrix.artifact-target-name }})
          path: |
            ${{ matrix.bundle-path }}/appimage/Full Steam Ahead_*.AppImage*
            ${{ matrix.bundle-path }}/deb/Full Steam Ahead_*.deb*
            ${{ matrix.bundle-path }}/msi/Full Steam Ahead_*.msi*
            ${{ matrix.bundle-path }}/nsis/Full Steam Ahead_*-setup.exe*
            ${{ matrix.bundle-path }}/rpm/Full Steam Ahead_*.rpm*
            ${{ matrix.bundle-path }}/dmg/Full Steam Ahead_*.dmg*
          if-no-files-found: error

      - name: Upload standalone app
        if: runner.os != 'macOS'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Standalone app (${{ matrix.artifact-target-name }})
          path: standalone/*
          if-no-files-found: error
