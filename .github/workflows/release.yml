name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release; leave empty to build the selected ref without publishing"
        required: false

permissions:
  contents: write

jobs:
  test:
    name: Test
    uses: ./.github/workflows/test.yml
    with:
      ref: ${{ inputs.tag || github.ref }}

  build:
    name: Build ${{ matrix.name }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            bundles: msi,nsis
            artifact: windows
          - name: Linux
            os: ubuntu-latest
            bundles: deb,appimage
            artifact: linux

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: pnpm install --no-frozen-lockfile

      - name: Build Tauri bundles
        run: pnpm tauri build --bundles ${{ matrix.bundles }}

      - uses: actions/upload-artifact@v4
        with:
          name: full-steam-ahead-${{ matrix.artifact }}
          path: src-tauri/target/release/bundle/**/*
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || inputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets/
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          draft: true
          tag_name: ${{ inputs.tag || github.ref_name }}
